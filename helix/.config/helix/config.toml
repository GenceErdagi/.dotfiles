[editor]
true-color = true
line-number = "relative"
mouse = true
bufferline = "always"
color-modes = true
auto-save = true

[editor.soft-wrap]
enable = true
max-wrap = 25
max-indent-retain = 0

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true
character = "│"
skip-levels = 1

[editor.whitespace.render]
tab = "all"

[keys.normal]
C-b = ":bc"
esc = ["collapse_selection","keep_primary_selection"]
A-F = ":format"
Y = ":clipboard-yank"

[keys.select]
A-F = ":format"
Y = ":clipboard-yank"
