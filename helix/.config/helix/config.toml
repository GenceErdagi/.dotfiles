[editor]
true-color = true
line-number = "relative"
mouse = true
bufferline = "always"
color-modes = true

[editor.soft-wrap]
enable = true
max-wrap = 25
max-indent-retain = 0
wrap-indicator = ""

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true
character = "│"
skip-levels = 1

[editor.statusline]
left = ["mode", "spinner", "selections", "primary-selection-length"]
center = ["file-name", "read-only-indicator", "file-modification-indicator", "version-control"]
right = ["diagnostics", "workspace-diagnostics", "file-encoding", "file-line-ending", "file-type", "position", "position-percentage"]
separator = "│"

[editor.whitespace.render]
tab = "all"

[editor.auto-pairs]
'(' = ')'
'{' = '}'
'[' = ']'
'"' = '"'
'`' = '`'
'<' = '>'

[keys.normal]
C-b = ":bc"
esc = ["collapse_selection","keep_primary_selection"]
