inherits = "monokai_pro"

"ui.statusline.normal" = { fg = "#19181a", bg = "#a9dc76" }
"ui.statusline.insert" = { fg = "#19181a", bg = "#fc9867" }
"ui.statusline.select" = { fg = "#19181a", bg = "#ab9df2" }

# Syntax Highlighting Overrides based on VS Code Screenshot
"keyword" = "#ff6188" # Pink (import, export, from)
"keyword.control" = "#ff6188" # Pink (return, if, else)
"keyword.function" = "#78dce8" # Cyan/Blue (function keyword often varies, but distinct in some themes. In screenshot `function` is pink. Let's keep keyword pink.)
"keyword.storage" = "#ff6188" # Pink (const, let, var)

"type" = "#78dce8" # Cyan (Metadata, Readonly, ReactNode) - This was a key difference
"type.builtin" = "#78dce8" # Cyan
"variable" = "#fcfcfa" # Default text color usually, but screenshot shows `geistSans` as Cyan? 
# Wait, `geistSans` is a const. In some themes, constants are colored.
# `Geist` is a function/class.
# Let's map functions and special variables to Cyan.
"function" = "#78dce8" # Cyan (Geist, RootLayout)
"function.macro" = "#78dce8" # Cyan

"string" = "#ffd866" # Yellow
"constant.numeric" = "#ab9df2" # Purple
"constant.character.escape" = "#ab9df2" # Purple

"tag" = "#ff6188" # Pink (html, head, body, link)
"attribute" = { fg = "#a9dc76", modifiers = ["italic"] } # Green Italic (className, lang, href)

"variable.parameter" = "#fc9867" # Orange (children)
"variable.other.member" = "#fcfcfa" # Object properties often white or specific color. Screenshot: `variable` in `geistSans.variable` is white? 
# `geistSans.variable`: `variable` is white. `geistSans` is Cyan.
# `title`: Pink (Object key).
"property" = "#ff6188" # Pink (Object keys like title, subsets)

"comment" = "#727072" # Grey

# Punctuation
"punctuation.delimiter" = "#fcfcfa" # White
"punctuation.bracket" = "#ffd866" # Yellow/Gold (braces often colored in Monokai Pro)
# In screenshot, `}` is pink in `export ... }`, but `{` in `Geist({...` is yellow.
# Helix doesn't do context-aware bracket coloring easily without plugins.
# I'll stick to a neutral or Gold default.

# UI overrides to ensure consistency
"ui.background" = "#222222"
"ui.text" = "#fcfcfa"
"ui.linenr" = "#727072"
"ui.linenr.selected" = "#ffd866"
"ui.selection" = { bg = "#403e41" }
