"$schema" = "https://yazi-rs.github.io/schemas/theme.json"

[flavor]
dark  = "ashen"
light = ""

[mgr]
cwd = { fg = "#C4693D" }

find_keyword  = { fg = "#C4693D", bold = true, italic = true, underline = true }
find_position = { fg = "#D87C4A", bold = true, italic = true }

symlink_target = { italic = true }

marker_copied   = { fg = "#98971a", bg = "#98971a" }
marker_cut      = { fg = "#cc241d", bg = "#cc241d" }
marker_marked   = { fg = "#8be9fd", bg = "#8be9fd" }
marker_selected = { fg = "#f1fa8c", bg = "#f1fa8c" }

count_copied   = { fg = "white", bg = "green" }
count_cut      = { fg = "white", bg = "red" }
count_selected = { fg = "black", bg = "yellow" }

border_symbol = "│"
border_style  = { fg = "#535353" }

[tabs]
active   = { bg = "#C4693D", bold = true }
inactive = { fg = "#C4693D", bg = "#1d1d1d" }

sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { bg = "#C4693D", bold = true }
normal_alt  = { fg = "#C4693D", bg = "#1d1d1d" }

select_main = { bg = "#E5A72A", bold = true }
select_alt  = { fg = "#E5A72A", bg = "#1d1d1d" }

unset_main = { bg = "#C53030", bold = true }
unset_alt  = { fg = "#C53030", bg = "#1d1d1d" }

[indicator]
parent  = { reversed = true }
current = { reversed = true }
preview = { underline = true }
padding = { open = "", close = "" }

[status]
overall   = {}
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

perm_sep   = { fg = "#535353" }
perm_type  = { fg = "#98971a" }
perm_read  = { fg = "#f1fa8c" }
perm_write = { fg = "#ff5555" }
perm_exec  = { fg = "#8be9fd" }

progress_label  = { bold = true }
progress_normal = { fg = "#98971a", bg = "#191919" }
progress_error  = { fg = "#f1fa8c", bg = "#ff5555" }

[which]
cols            = 3
mask            = { bg = "#191919" }
cand            = { fg = "#8be9fd" }
rest            = { fg = "#535353" }
desc            = { fg = "#ff79c6" }
separator       = "  "
separator_style = { fg = "#535353" }

[confirm]
border     = { fg = "#4A8B8B" }
title      = { fg = "#4A8B8B" }
body       = {}
list       = {}
btn_yes    = { reversed = true }
btn_no     = {}
btn_labels = [ "  [Y]es  ", "  (N)o  " ]

[spot]
border = { fg = "#4A8B8B" }
title  = { fg = "#4A8B8B" }

tbl_col  = { fg = "#4A8B8B" }
tbl_cell = { fg = "#f1fa8c", reversed = true }

[notify]
title_info  = { fg = "#98971a" }
title_warn  = { fg = "#f1fa8c" }
title_error = { fg = "#ff5555" }

icon_info  = ""
icon_warn  = ""
icon_error = ""

[pick]
border   = { fg = "#4A8B8B" }
active   = { fg = "#ff79c6", bold = true }
inactive = {}

[input]
border   = { fg = "#4A8B8B" }
title    = {}
value    = {}
selected = { reversed = true }

[cmp]
border   = { fg = "#4A8B8B" }
active   = { reversed = true }
inactive = {}

icon_file    = ""
icon_folder  = ""
icon_command = ""

[tasks]
border  = { fg = "#4A8B8B" }
title   = {}
hovered = { fg = "#ff79c6", bold = true }

[help]
on      = { fg = "#8be9fd" }
run     = { fg = "#ff79c6" }
desc    = {}
hovered = { reversed = true, bold = true }
footer  = { fg = "#191919", bg = "#f8f8f2" }

[filetype]
rules = [
	{ mime = "image/*", fg = "#f1fa8c" },
	{ mime = "{audio,video}/*", fg = "#ff79c6" },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#ff5555" },
	{ mime = "application/{pdf,doc,rtf}", fg = "#8be9fd" },
	{ mime = "vfs/{absent,stale}", fg = "#6272a4" },
	{ url = "*", is = "orphan", fg = "white", bg = "red" },
	{ url = "*", is = "exec"  , fg = "#50fa7b" },
	{ url = "*", is = "dummy", bg = "red" },
	{ url = "*/", is = "dummy", bg = "red" },
	{ url = "*/", fg = "#4A8B8B" }
]
