#----------------------------------------------------------
#--  Monokai Pro Spectrum (Darker)
#--  Normal: Green, Select: Purple
#----------------------------------------------------------

[mgr]
cwd = { fg = "#5ad4e6" } # Spectrum Cyan

# Hovered
hovered = { reversed = true }
preview_hovered = { underline = true }

# Find
find_symbol = " Finding: "
find_keyword = { fg = "#fc618d", bold = true, italic = true, underline = true } # Spectrum Pink
find_position = { fg = "#948ae3", bg = "reset", bold = true, italic = true } # Spectrum Purple

# Symlink
symlink_target = { fg = "#5ad4e6", italic = true } # Spectrum Cyan

# Marker
marker_copied = { fg = "#7bd88f", bg = "#7bd88f" } # Spectrum Green
marker_cut = { fg = "#fc618d", bg = "#fc618d" } # Spectrum Red
marker_marked = { fg = "#948ae3", bg = "#948ae3" } # Spectrum Purple
marker_selected = { fg = "#fc618d", bg = "#fc618d" } # Spectrum Red

# Count
count_copied = { fg = "#222222", bg = "#7bd88f" }
count_cut = { fg = "#222222", bg = "#fc618d" }
count_selected = { fg = "#222222", bg = "#fce566" } # Spectrum Yellow

# Border
border_symbol = "│"
border_style = { fg = "#69676c" } # Spectrum Base5

# Tabs
[tabs]
active = { fg = "#222222", bg = "#fce566", bold = true } # Yellow Active (Standard Monokai)
inactive = { fg = "#fce566", bg = "#222222" }

# Separator
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

# Modes
[mode]
# Normal mode (Requested: Green)
normal_main = { fg = "#222222", bg = "#7bd88f", bold = true }
normal_alt = { fg = "#7bd88f", bg = "#363537" }

# Select mode (Requested: Purple)
select_main = { fg = "#222222", bg = "#948ae3", bold = true }
select_alt = { fg = "#948ae3", bg = "#363537" }

# Unset mode (Red)
unset_main = { bg = "#fc618d", bold = true }
unset_alt = { fg = "#fc618d", bg = "gray" }

# Status bar
[status]
overall = {}
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }

# Permissions
perm_sep = { fg = "#69676c" }
perm_type = { fg = "#7bd88f" }
perm_read = { fg = "#fce566" }
perm_write = { fg = "#fc618d" }
perm_exec = { fg = "#5ad4e6" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#5ad4e6", bg = "#222222" }
progress_error = { fg = "#fc618d", bg = "#222222" }

# Which
[which]
cols = 3
mask = { bg = "#222222" }
cand = { fg = "#5ad4e6" }
rest = { fg = "#69676c" }
desc = { fg = "#948ae3" }
separator = "  "
separator_style = { fg = "#69676c" }

# Confirmation
[confirm]
border = { fg = "#fce566" }
title = { fg = "#fce566" }
content = {}
list = {}
btn_yes = { reversed = true }
btn_no = {}
btn_labels = ["  [Y]es  ", "  (N)o  "]

# Spotter
[spot]
border = { fg = "#5ad4e6" }
title = { fg = "#5ad4e6" }

# Table
tbl_col = { fg = "#5ad4e6" }
tbl_cell = { fg = "#fce566", reversed = true }

# Norifications
[notify]
title_info = { fg = "#7bd88f" }
title_warn = { fg = "#fce566" }
title_error = { fg = "#fc618d" }

# Icons
icon_info = ""
icon_warn = ""
icon_error = ""

# Picker
[pick]
border = { fg = "#5ad4e6" }
active = { fg = "#948ae3", bold = true }
inactive = {}

# Input
[input]
border = { fg = "#5ad4e6" }
title = {}
value = {}
selected = { reversed = true }

# Completion
[cmp]
border = { fg = "#5ad4e6" }
active = { reversed = true }
inactive = {}

# Icons
icon_file = ""
icon_folder = ""
icon_command = ""

# : Task manager {{{
[tasks]
border = { fg = "#5ad4e6" }
title = {}
hovered = { fg = "#948ae3", underline = true }

# Help menu
[help]
on = { fg = "#5ad4e6" }
run = { fg = "#948ae3" }
desc = {}
hovered = { reversed = true, bold = true }
footer = { fg = "#222222", bg = "#f7f1ff" }

# File-specific styles 
[filetype]
rules = [
  # Images
  { mime = "image/*", fg = "#fce566" }, # Yellow

  # Media
  { mime = "{audio,video}/*", fg = "#7bd88f" }, # Green

  # Archives
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#fc618d" }, # Red

  # Documents
  { mime = "application/{pdf,doc,rtf}", fg = "#5ad4e6" }, # Cyan

  # Empty files
  { mime = "inode/empty", fg = "#fc618d" },

  # Special files
  { name = "*", is = "orphan", bg = "#fc618d" },
  { name = "*", is = "exec", fg = "#7bd88f" },

  # Dummy files
  { name = "*", is = "dummy", bg = "#fc618d" },
  { name = "*/", is = "dummy", bg = "#fc618d" },

  # Fallback (Using 'url' as per your snippet to ensure Directory matching)
  { url = "*/", fg = "#fd9353", bold = true }, # Spectrum Orange
]