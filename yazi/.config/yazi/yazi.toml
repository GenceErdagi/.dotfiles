[mgr]
sort_by = "natural"
linemode = "size"
show_symlink = true
show_hidden = true

[[plugin.prepend_fetchers]]
id  = "git"
url = "*"
run = "git"

[[plugin.prepend_fetchers]]
id  = "git"
url = "*/"
run = "git"

[opener]
text = [
    { run = 'nu ~/.config/nushell/scripts/open_in_hx.nu "$@"', block = false, desc = "Open in Helix via Zellij" }
]

[open]
prepend_rules = [
    { mime = "text/*", use = "text" },
    { mime = "application/json", use = "text" }
]
