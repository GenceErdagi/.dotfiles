# rust-analyzer configuration for large projects
# Optimized for projects like zellij with many crates

[rust-analyzer]
# Reduce memory usage and improve startup time
cargo.buildScripts.enable = false
procMacro.enable = false

# Disable features that are slow on large projects
cargo.features = "all"
rustfmt.enableRustfmt = false
runnableEnv = {}

# Increase crate graph loading
crateStartupGraph = "full"

# Disable heavy diagnostics
diagnostics.enable = true
diagnostics.disabled = ["unused-must-use"]

# Indexing configuration
index.enable = true
index.stable = true

# Cache configuration - use heavy for large projects
cacheSize = "heavy"

# Don't update dependencies on open
updates.checkOnStartup = false

# Reduce diagnostics delay
diagnostics.delayMS = 500
